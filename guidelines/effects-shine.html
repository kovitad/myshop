<!-- @dsCard group="Silver Effects" viewport="700x190" name="Shine sweep" subtitle=".k-shine — one 900ms pass on hover; try it" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 22px 24px; box-sizing: border-box; display: flex; align-items: center; gap: 20px; }
.btn { display: inline-flex; align-items: center; justify-content: center; height: 48px; padding: 0 26px; border-radius: var(--radius-pill); background: var(--green-700); color: var(--text-on-dark); font: 600 15px/1 var(--font-sans); cursor: pointer; box-shadow: var(--shadow-sm); border: 0; }
.chrome { background: var(--grad-chrome); color: var(--charcoal-800); border: 1px solid var(--silver-400); box-shadow: var(--inset-sheen), var(--shadow-xs); }
.card { flex: 1; background: var(--surface-raised); border: 1px solid var(--border-silver); border-radius: var(--radius-lg); box-shadow: var(--shadow-silver); padding: 16px 20px; cursor: pointer; }
.card b { font: 600 18px/1.25 var(--font-display); color: var(--text-heading); display: block; }
.card small { font: 400 11.5px/1.5 var(--font-sans); color: var(--text-muted); }
</style></head>
<body>
<button class="btn k-shine" type="button">Read the guide</button>
<button class="btn chrome k-shine" type="button">Get the ebook</button>
<div class="card k-shine">
  <b>Premium cards shine too</b>
  <small>Hover: sweep runs once. Max ~2 shining elements per viewport. Honors reduced motion.</small>
</div>
</body>
</html>
