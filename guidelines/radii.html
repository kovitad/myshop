<!-- @dsCard group="Spacing & Shape" viewport="700x170" name="Corner radii" subtitle="Restrained rounding; pill for CTAs & tags" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 24px; box-sizing: border-box; display: flex; gap: 14px; align-items: flex-end; }
.b { background: var(--surface-raised); border: 1px solid var(--border-silver); box-shadow: var(--shadow-xs); width: 96px; height: 82px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; box-sizing: border-box; font: 500 10px/1 var(--font-sans); color: var(--text-muted); }
</style></head>
<body>
<div class="b" style="border-radius: var(--radius-xs)">xs · 4</div>
<div class="b" style="border-radius: var(--radius-sm)">sm · 8</div>
<div class="b" style="border-radius: var(--radius-md)">md · 12 inputs</div>
<div class="b" style="border-radius: var(--radius-lg)">lg · 18 cards</div>
<div class="b" style="border-radius: var(--radius-xl)">xl · 28</div>
<div class="b" style="border-radius: var(--radius-pill); height: 48px; width: 150px; align-items: center; padding: 0;">pill · buttons, tags</div>
</body>
</html>
