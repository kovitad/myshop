<!-- @dsCard group="Colors" viewport="700x190" name="Ivory & charcoal" subtitle="Paper tints and ink steps" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; }
.ramp { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.c { height: 62px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); position: relative; }
.c span { position: absolute; left: 8px; bottom: 6px; font: 600 9px/1 var(--font-sans); }
.lt { color: var(--charcoal-700); } .dk { color: rgba(247,242,232,.9); }
</style></head>
<body>
<div class="ramp">
  <div class="c" style="background:var(--ivory-50)"><span class="lt">ivory-50</span></div>
  <div class="c" style="background:var(--ivory-100)"><span class="lt">ivory-100</span></div>
  <div class="c" style="background:var(--ivory-200); outline: 2px solid var(--green-500); outline-offset: 1px;"><span class="lt">ivory-200 ★ page</span></div>
  <div class="c" style="background:var(--ivory-300)"><span class="lt">ivory-300</span></div>
  <div class="c" style="background:var(--ivory-400)"><span class="lt">ivory-400</span></div>
</div>
<div class="ramp">
  <div class="c" style="background:var(--charcoal-500)"><span class="dk">charcoal-500</span></div>
  <div class="c" style="background:var(--charcoal-600)"><span class="dk">charcoal-600</span></div>
  <div class="c" style="background:var(--charcoal-700)"><span class="dk">charcoal-700 body</span></div>
  <div class="c" style="background:var(--charcoal-800); outline: 2px solid var(--green-500); outline-offset: 1px;"><span class="dk">charcoal-800 ★</span></div>
  <div class="c" style="background:var(--charcoal-900)"><span class="dk">charcoal-900</span></div>
</div>
</body>
</html>
