<!-- @dsCard group="Brand" viewport="700x400" name="Immersive hero pattern" subtitle="Full-bleed photography + scrim + overlay header — drop an image to try it" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="../assets/image-slot.js"></script>
<style>body { margin: 0; }</style>
</head>
<body>
<section style="position: relative; height: 400px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; background: var(--grad-green-depth);">
  <div style="position: absolute; left: 0; right: 0; top: -60%; height: 160%;">
    <image-slot id="guideline-hero-demo" shape="rect" placeholder="Drop a photo — Thai wellness, natural light"></image-slot>
  </div>
  <div style="position: absolute; inset: 0; background: var(--grad-scrim-hero); pointer-events: none;"></div>
  <header style="position: absolute; top: 0; left: 0; right: 0; z-index: 2; background: linear-gradient(180deg, rgba(14,33,27,0.45) 0%, rgba(14,33,27,0) 100%); pointer-events: none;">
    <div style="padding: 0 28px; height: 60px; display: flex; align-items: center; gap: 20px;">
      <span style="display: inline-flex; align-items: baseline; gap: 3px;">
        <span style="font: 400 20px/1 var(--font-wordmark); letter-spacing: 0.04em; color: var(--text-on-dark);">KOVITAD</span>
        <span style="font: 500 11px/1 var(--font-sans); color: var(--silver-300);">.shop</span>
      </span>
      <nav style="display: flex; gap: 16px; font: 500 12.5px/1 var(--font-sans); color: rgba(243,239,228,0.82); margin-left: 10px;">
        <span>Home</span><span>Library</span><span>Articles</span>
      </nav>
      <span class="k-shine" style="margin-left: auto; display: inline-flex; align-items: center; height: 32px; padding: 0 16px; border-radius: 999px; background: var(--grad-chrome); border: 1px solid var(--silver-400); color: var(--charcoal-800); font: 600 11px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase;">Sign in</span>
    </div>
  </header>
  <div style="position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 80px 24px 30px; pointer-events: none;">
    <span style="color: var(--silver-200); font: 600 10px/1 var(--font-sans); letter-spacing: 0.22em; text-transform: uppercase; text-shadow: 0 1px 12px rgba(14,33,27,0.5);">Longevity, made practical</span>
    <h1 style="font: 600 44px/1.04 var(--font-display); color: #FFFFFF; margin: 0; text-shadow: 0 2px 28px rgba(14,33,27,0.55);">Small habits,<br>longer <span class="k-silver-text">health</span>.</h1>
    <span class="k-shine" style="margin-top: 6px; display: inline-flex; align-items: center; height: 40px; padding: 0 24px; border-radius: 999px; background: var(--grad-chrome); border: 1px solid var(--silver-400); color: var(--charcoal-800); font: 600 11px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap;">Browse the library</span>
  </div>
</section>
</body>
</html>
