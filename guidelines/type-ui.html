<!-- @dsCard group="Type" viewport="700x190" name="UI type & wordmark" subtitle="Eyebrows, labels, and the Marcellus lockup" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 20px 28px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 12px; }
</style></head>
<body>
<div class="col">
  <span class="k-eyebrow">Eyebrow label · 12px · 0.16em</span>
  <span style="font: 600 15px/1 var(--font-sans); color: var(--text-heading);">Button label · Figtree 600</span>
  <span style="font: 500 14px/1 var(--font-sans); color: var(--text-muted);">Metadata · Figtree 500 muted</span>
  <span style="font: 600 11px/1 var(--font-sans); letter-spacing: .06em; text-transform: uppercase; color: var(--silver-700);">Badge caps · 11px</span>
</div>
<div class="col" style="border-left: 1px solid var(--border-hairline); padding-left: 24px;">
  <span style="font: 400 34px/1 var(--font-wordmark); letter-spacing: var(--tracking-wordmark); color: var(--green-700);">KOVITAD<span style="font: 500 17px/1 var(--font-sans); color: var(--silver-700);">.shop</span></span>
  <span style="font: 400 11.5px/1.5 var(--font-sans); color: var(--text-muted);">Wordmark: Marcellus + Figtree ".shop" — never bold, never colored silver-on-silver</span>
</div>
</body>
</html>
