<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Muted, natural — never alarming" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 16px; box-sizing: border-box; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.s { border-radius: var(--radius-md); padding: 14px 16px; display: flex; flex-direction: column; gap: 3px; }
.s b { font: 600 13px/1.3 var(--font-sans); }
.s code { font: 400 9.5px/1.4 ui-monospace, monospace; opacity: .7; }
</style></head>
<body>
<div class="grid">
  <div class="s" style="background: var(--success-100); color: var(--success-600);"><b>Success</b><span style="font: 400 11px/1.4 var(--font-sans)">You're on the list.</span><code>--success-600 / -100</code></div>
  <div class="s" style="background: var(--warning-100); color: var(--warning-600);"><b>Warning</b><span style="font: 400 11px/1.4 var(--font-sans)">Last copies in stock.</span><code>--warning-600 / -100</code></div>
  <div class="s" style="background: var(--danger-100); color: var(--danger-600);"><b>Danger</b><span style="font: 400 11px/1.4 var(--font-sans)">Payment didn't go through.</span><code>--danger-600 / -100</code></div>
</div>
</body>
</html>
