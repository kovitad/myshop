<!-- @dsCard group="Type" viewport="700x380" name="Type scale" subtitle="--text-xs through --text-6xl" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 24px; box-sizing: border-box; }
.r { display: grid; grid-template-columns: 92px 1fr; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-hairline); }
.r:last-child { border-bottom: 0; }
.r code { font: 400 10px/1 ui-monospace, monospace; color: var(--text-faint); }
.d { font-family: var(--font-display); font-weight: 600; color: var(--text-heading); line-height: 1.15; }
.s { font-family: var(--font-sans); color: var(--text-body); line-height: 1.3; }
</style></head>
<body>
<div class="r"><code>6xl · 88</code><span class="d" style="font-size: var(--text-6xl)">Hero</span></div>
<div class="r"><code>5xl · 64</code><span class="d" style="font-size: var(--text-5xl)">Hero headline</span></div>
<div class="r"><code>4xl · 46</code><span class="d" style="font-size: var(--text-4xl)">Page title</span></div>
<div class="r"><code>3xl · 36</code><span class="d" style="font-size: var(--text-3xl)">Section heading</span></div>
<div class="r"><code>2xl · 28</code><span class="d" style="font-size: var(--text-2xl)">Card heading</span></div>
<div class="r"><code>xl · 22</code><span class="d" style="font-size: var(--text-xl)">Subheading serif</span></div>
<div class="r"><code>lg · 18</code><span class="s" style="font-size: var(--text-lg)">Lede paragraph — sans</span></div>
<div class="r"><code>md · 16</code><span class="s" style="font-size: var(--text-md)">Body text — sans</span></div>
<div class="r"><code>sm · 14</code><span class="s" style="font-size: var(--text-sm)">UI labels, metadata</span></div>
<div class="r"><code>xs · 12</code><span class="s" style="font-size: var(--text-xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; font-weight: 600; color: var(--green-600);">Eyebrow labels</span></div>
</body>
</html>
