<!-- @dsCard group="Spacing & Shape" viewport="700x260" name="Spacing scale" subtitle="4px base — generous whitespace is a brand feature" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 24px; box-sizing: border-box; }
.r { display: grid; grid-template-columns: 110px 1fr; align-items: center; gap: 12px; padding: 3px 0; }
.r code { font: 400 10.5px/1 ui-monospace, monospace; color: var(--text-muted); }
.bar { height: 14px; background: var(--green-200); border-radius: 3px; position: relative; }
.bar.k { background: var(--grad-chrome); border: 1px solid var(--silver-400); box-sizing: border-box; }
</style></head>
<body>
<div class="r"><code>--space-2 · 8</code><div><div class="bar" style="width:8px"></div></div></div>
<div class="r"><code>--space-4 · 16</code><div><div class="bar" style="width:16px"></div></div></div>
<div class="r"><code>--space-6 · 24</code><div><div class="bar k" style="width:24px"></div></div></div>
<div class="r"><code>--space-8 · 32</code><div><div class="bar" style="width:32px"></div></div></div>
<div class="r"><code>--space-12 · 48</code><div><div class="bar" style="width:48px"></div></div></div>
<div class="r"><code>--space-16 · 64</code><div><div class="bar k" style="width:64px"></div></div></div>
<div class="r"><code>--space-24 · 96</code><div><div class="bar" style="width:96px"></div></div></div>
<div class="r"><code>--space-32 · 128</code><div><div class="bar k" style="width:128px"></div></div></div>
<p style="font: 400 11px/1.5 var(--font-sans); color: var(--text-muted); margin-top: 8px;">Card padding 24 · section gap 96 (64 mobile) · container 1180 / article 720</p>
</body>
</html>
