<!-- @dsCard group="Colors" viewport="700x150" name="Forest green scale" subtitle="--green-50 … --green-950" -->
<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { padding: 16px; box-sizing: border-box; }
.ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
.c { height: 76px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); position: relative; }
.c span { position: absolute; left: 6px; bottom: 5px; font: 600 9px/1 var(--font-sans); }
.lt { color: var(--charcoal-700); } .dk { color: rgba(247,242,232,.85); }
</style></head>
<body>
<div class="ramp">
  <div class="c" style="background:var(--green-50)"><span class="lt">50</span></div>
  <div class="c" style="background:var(--green-100)"><span class="lt">100</span></div>
  <div class="c" style="background:var(--green-200)"><span class="lt">200</span></div>
  <div class="c" style="background:var(--green-300)"><span class="lt">300</span></div>
  <div class="c" style="background:var(--green-400)"><span class="dk">400</span></div>
  <div class="c" style="background:var(--green-500)"><span class="dk">500</span></div>
  <div class="c" style="background:var(--green-600)"><span class="dk">600</span></div>
  <div class="c" style="background:var(--green-700); outline: 2px solid var(--silver-500); outline-offset: 1px;"><span class="dk">700 ★</span></div>
  <div class="c" style="background:var(--green-800)"><span class="dk">800</span></div>
  <div class="c" style="background:var(--green-900)"><span class="dk">900</span></div>
  <div class="c" style="background:var(--green-950)"><span class="dk">950</span></div>
</div>
</body>
</html>
