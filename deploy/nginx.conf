server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  # Lightweight health endpoint for Docker / Lightsail checks.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Cache immutable-ish static assets. HTML stays fresh for quick edits.
  location ~* \.(?:css|js|jsx|json|png|jpg|jpeg|gif|webp|bmp|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
