<!-- @dsCard group="KOVITAD.shop" viewport="1280x800" name="Website — interactive, bilingual" subtitle="ไทย/EN toggle · Home ▸ Library ▸ Article click-through" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOVITAD.shop — UI kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
<script src="../../assets/image-slot.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="SiteChrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Library.jsx"></script>
<script type="text/babel" src="Article.jsx"></script>
<script type="text/babel">
function App() {
  const DS = window.KOVITADWellnessDesignSystem_61cabf;
  const { Dialog, Toast, Button, Icon, Badge } = DS;
  const [screen, setScreen] = React.useState(localStorage.getItem("kovitad-kit-screen") || "Home");
  const [lang, setLang] = React.useState(localStorage.getItem("kovitad-kit-lang") || "th");
  const [toast, setToast] = React.useState(null);
  const [buying, setBuying] = React.useState(null);
  const toastTimer = React.useRef(null);

  const nav = (s) => { setScreen(s); localStorage.setItem("kovitad-kit-screen", s); window.scrollTo(0, 0); };
  const pickLang = (l) => { setLang(l); localStorage.setItem("kovitad-kit-lang", l); };
  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3200);
  };
  const buy = (item) => setBuying(item);

  const D = lang === "th"
    ? { notNow: "ไว้ก่อน", get: "รับเลย", added: "เพิ่มลงตะกร้าแล้ว", premium: "พรีเมียม", kind: "อีบุ๊ก", dl: " ดาวน์โหลดทันที — ไฟล์ PDF และ EPUB เป็นของคุณตลอดไป อัปเดตฟรี" }
    : { notNow: "Not now", get: "Get it", added: "Added to your bag.", premium: "Premium", kind: "Ebook", dl: " Instant download — PDF & EPUB, yours forever, free updates included." };

  const screens = {
    Home: <HomeScreen onNav={nav} onToast={showToast} onBuy={buy} lang={lang} />,
    Library: <LibraryScreen onToast={showToast} onBuy={buy} lang={lang} />,
    Article: <ArticleScreen onNav={nav} onToast={showToast} lang={lang} />,
  };

  return (
    <div data-screen-label={"KOVITAD.shop — " + screen + " (" + lang + ")"}>
      <SiteHeader active={screen} onNav={nav} onToast={showToast} tone={screen === "Home" ? "overlay" : "solid"} lang={lang} onLang={pickLang} />
      {screens[screen]}
      <SiteFooter onNav={nav} lang={lang} />
      {buying && (
        <Dialog
          title={buying.title}
          onClose={() => setBuying(null)}
          width={440}
          footer={
            <React.Fragment>
              <Button variant="ghost" onClick={() => setBuying(null)}>{D.notNow}</Button>
              <Button variant="chrome" icon={<Icon name="sparkles" size={14} />} onClick={() => { setBuying(null); showToast(D.added); }}>
                {D.get} · {buying.price}
              </Button>
            </React.Fragment>
          }
        >
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "flex", gap: 8 }}>
              <Badge tone="silver">{D.premium}</Badge>
              <Badge tone="ivory">{D.kind}</Badge>
            </div>
            <p style={{ fontSize: "var(--text-sm)", lineHeight: lang === "th" ? 1.85 : 1.6 }}>{buying.d}{D.dl}</p>
          </div>
        </Dialog>
      )}
      {toast && <Toast position="fixed" icon={<Icon name="check" size={16} />} onDismiss={() => setToast(null)}>{toast}</Toast>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
