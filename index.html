<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="KOVITAD.shop wellness design system and bilingual UI kit.">
  <title>KOVITAD.shop</title>
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="refresh" content="0; url=/ui_kits/kovitad_shop/">
  <style>
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 560px;
      padding: 32px;
      border: 1px solid var(--border-silver);
      border-radius: var(--radius-lg);
      background: var(--surface-raised);
      box-shadow: var(--shadow-silver);
    }
    .wordmark {
      font-family: var(--font-wordmark);
      letter-spacing: var(--tracking-wordmark);
      color: var(--green-800);
      font-size: 32px;
      margin-bottom: 12px;
    }
    .wordmark span {
      font-family: var(--font-sans);
      font-size: 18px;
      letter-spacing: 0;
      color: var(--text-muted);
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: var(--radius-pill);
      background: var(--green-700);
      color: var(--text-on-dark);
      text-decoration: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="wordmark">KOVITAD<span>.shop</span></div>
      <p>กำลังเปิดชุด UI ภาษาไทยและอังกฤษสำหรับ KOVITAD.shop</p>
      <a href="/ui_kits/kovitad_shop/">Open the bilingual UI kit</a>
    </section>
  </main>
</body>
</html>
